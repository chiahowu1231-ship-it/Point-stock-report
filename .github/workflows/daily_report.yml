
name: Point Stock Daily Report (TW 16:00)

on:
  schedule:
    # 台灣 16:00 = UTC 08:00；週一～週五（GitHub Actions cron 使用 UTC）[3](https://stackoverflow.com/questions/65634251/github-actions-dynamic-workflow-name)[4](https://docs.github.com/en/actions/reference)
    - cron: "0 8 * * 1-5"
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Excel/PDF (DAYS=5)
        env:
          TZ: Asia/Taipei
          DAYS: "5"
        run: |
          python src/run_report.py

      - name: Upload artifacts (auto expire)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ike-report
          path: |
            output/*.xlsx
            output/*.pdf
            output/summary.json
          retention-days: 7  # artifacts 可設定保留天數，避免容量累積[2](https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions)[5](https://www.codestudy.net/blog/github-actions-dynamic-workflow-name/)

      # ✅（新增段落 1）組出你要的報表信標題：台灣時區 yyyy-mm-dd
      - name: Build mail subject (Asia/Taipei yyyy-mm-dd)
        if: always()
        run: |
          echo "MAIL_SUBJECT=【劵商分點狙擊分析】$(TZ=Asia/Taipei date +'%Y-%m-%d')（TW 16:00）Point-stock-report" >> $GITHUB_ENV

      - name: Send email (always)
        if: always()
        env:
          DAYS: "5"

          # Host/Port 非敏感資訊，建議寫死避免 secrets 空值造成連線問題
          SMTP_HOST: "smtp.gmail.com"
          SMTP_PORT: "587"

          # 敏感資訊走 secrets
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM:  ${{ secrets.MAIL_FROM }}
          MAIL_TO:    ${{ secrets.MAIL_TO }}
          MAIL_BCC:   ${{ secrets.MAIL_BCC }}

          # ✅（新增段落 2）把上一個 step 寫進 GITHUB_ENV 的標題帶給 mailer.py
          MAIL_SUBJECT: ${{ env.MAIL_SUBJECT }}
        run: |
          python src/mailer.py
