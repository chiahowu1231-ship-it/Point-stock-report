
name: Point Stock Daily Report (TW 16:00)

on:
  schedule:
    # 台灣 16:00 = UTC 08:00；週一～週五（GitHub Actions cron 使用 UTC）[3](https://stackoverflow.com/questions/10318403/uploading-new-files-to-a-git-repository-directly-through-the-github-web-applicat)[4](https://www.youtube.com/watch?v=-9rTsx6ilvo)[5](https://docs.github.com/en/repositories/working-with-files/managing-files/adding-a-file-to-a-repository)
    - cron: "0 8 * * 1-5"
    # 若你想避開整點降低排程延遲，可改成台灣 16:03（UTC 08:03）[3](https://stackoverflow.com/questions/10318403/uploading-new-files-to-a-git-repository-directly-through-the-github-web-applicat)[4](https://www.youtube.com/watch?v=-9rTsx6ilvo)
    # - cron: "3 8 * * 1-5"
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Excel/PDF (DAYS=5)
        env:
          TZ: Asia/Taipei
          DAYS: "5"
        run: |
          python src/run_report.py

      # 無論 run_report 成功/失敗都上傳 artifacts（方便你下載檢查）
      - name: Upload artifacts (auto expire)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ike-report
          path: |
            output/*.xlsx
            output/*.pdf
            output/summary.json
          # artifacts 可設定保留天數，避免容量累積[1](https://support.google.com/accounts/answer/185833?hl=en)[2](https://evermap.com/Tutorial_AMM_UseAppPasswords.asp)
          retention-days: 7

      # 無論成功/失敗都寄信（信內會依 summary.json 顯示成功/失敗與錯誤摘要）
      - name: Send email (always)
        if: always()
        env:
          DAYS: "5"

          # ✅ 這兩個不要放 secrets，直接寫死最穩（避免空字串造成 connect 失敗）
          SMTP_HOST: "smtp.gmail.com"
          SMTP_PORT: "587"

          # ✅ 敏感資訊才放 secrets
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM:  ${{ secrets.MAIL_FROM }}
          MAIL_TO:    ${{ secrets.MAIL_TO }}
          MAIL_BCC:   ${{ secrets.MAIL_BCC }}
        run: |
          python src/mailer.py
