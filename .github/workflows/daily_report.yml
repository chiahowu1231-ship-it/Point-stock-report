name: 券商分點狙擊分析 (TW 16:00)

on:
  schedule:
    # 台灣 16:00 = UTC 08:00；週一～週五
    - cron: "0 8 * * 1-5"
  workflow_dispatch: {}

# GitHub Pages 部署所需權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只跑一個 Pages 部署
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────
  #  Job 1: 產生報表 + AI + Email + Telegram + 建立 Pages 內容
  # ─────────────────────────────────────────────────────────
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TZ: Asia/Taipei
      DAYS: "5"
      TOP_N: "10"
      MARKET_DATA: "1"
      MARKET_HISTORY_DAYS: "6"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Excel/PDF + market data
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python src/run_report.py

      - name: Gemini analysis (2.5-pro + fallback)
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: "gemini-2.5-pro"
          GEMINI_TEMPERATURE: "0.3"
          PROMPT_TOP_BROKERS: "7"
          PROMPT_TOP_STOCKS: "7"
          GEMINI_RETRIES: "3"
          GEMINI_ENABLE_FIXUP: "1"
          PYTHONUNBUFFERED: "1"
        run: |
          python src/ai_analyze_gemini.py

      - name: Verify analysis
        if: always()
        run: |
          python - <<'PY'
          import json
          with open("output/summary.json", "r", encoding="utf-8") as f:
              s = json.load(f)
          t = s.get("ai_analysis", "") or ""
          print(f"model={s.get('ai_model')} chars={len(t)} lines={len(t.splitlines())}")
          md = s.get("market_data", {})
          print(f"market: inst={len(md.get('institutional',[]))} taiex={len(md.get('taiex',[]))} futures={len(md.get('futures',[]))}")
          PY

      # 🆕 建構 Pages 網頁版（讀 output/summary.json + web/ → site/）
      - name: Build GitHub Pages site
        if: always()
        run: |
          python src/build_site.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ike-report
          path: |
            output/*.xlsx
            output/*.pdf
            output/summary.json
            output/ai_analysis.txt
          retention-days: 7
          if-no-files-found: warn

      # 🆕 上傳 Pages artifact，供 deploy-pages job 部署
      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Build mail subject
        if: always()
        run: |
          echo "MAIL_SUBJECT=【券商分點狙擊分析】$(TZ=Asia/Taipei date +'%Y-%m-%d')（TW 16:00）" >> $GITHUB_ENV

      - name: Send email
        if: always()
        env:
          SMTP_HOST: "smtp.gmail.com"
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM:  ${{ secrets.MAIL_FROM }}
          MAIL_TO:    ${{ secrets.MAIL_TO }}
          MAIL_BCC:   ${{ secrets.MAIL_BCC }}
          MAIL_SUBJECT: ${{ env.MAIL_SUBJECT }}
        run: |
          python src/mailer.py

      # 🆕 Telegram 推送（失敗不影響 workflow，未設 Secret 自動跳過）
      - name: Send Telegram notification
        if: always()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PAGES_URL:          ${{ secrets.PAGES_URL }}
        run: |
          python src/telegram_sender.py

  # ─────────────────────────────────────────────────────────
  #  Job 2: 部署 GitHub Pages
  # ─────────────────────────────────────────────────────────
  deploy-pages:
    needs: report
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
